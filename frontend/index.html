<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Site Icon -->
    <!-- Note: Agar logo.jpg hai toh type image/jpeg hoga. SVG ke liye image/svg+xml rakhein -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Mobile browser URL bar color (Matched with Neo-Banking Theme) -->
    <meta name="theme-color" content="#0b1c3c" /> 

    <!-- Primary Meta Tags -->
    <title>CrowdOne.world | Together We Can</title>
    <meta name="title" content="CrowdOne.world | Together We Can" />
    <meta name="description" content="Join CrowdOne.world, the fastest-growing global digital network. Grow your team, track your assets, and build a strong financial future." />
    <meta name="keywords" content="CrowdOne, CrowdOne World, CrowdOne.world, Global Network, Digital Assets, USDT, Team Building, C1" />
    <meta name="author" content="CrowdOne Team" />

    <!-- Open Graph / WhatsApp / Facebook / Telegram Sharing Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crowdone.world/" />
    <meta property="og:title" content="CrowdOne.world | Together We Can" />
    <meta property="og:description" content="Start your journey with the most transparent and secure global network. Join CrowdOne.world today!" />
    <!-- Apna banner ya logo ka live URL yahan daalein taaki WhatsApp/Telegram pe preview show ho -->
    <meta property="og:image" content="https://crowdone.world/logo.jpg" /> 

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://crowdone.world/" />
    <meta property="twitter:title" content="CrowdOne.world | Together We Can" />
    <meta property="twitter:description" content="Start your journey with the most transparent and secure global network. Join CrowdOne.world today!" />
    <meta property="twitter:image" content="https://crowdone.world/logo.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
